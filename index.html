
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArbuzGram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap');
      
      :root {
        --aero-blue: #00d2ff;
        --aero-green: #3a7bd5;
      }

      body {
        font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0f0f0f;
        color: #fff;
        margin: 0;
        overflow: hidden;
      }

      /* Ultra Realistic Liquid Animations */
      @keyframes water-swirl {
        0% { background-position: 0% 0%; transform: scale(1); }
        50% { background-position: 100% 100%; transform: scale(1.1); }
        100% { background-position: 0% 0%; transform: scale(1); }
      }

      @keyframes realistic-float {
        0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
        10% { opacity: 0.8; }
        50% { transform: translateY(50vh) translateX(40px) rotate(180deg); }
        90% { opacity: 0.4; }
        100% { transform: translateY(-20vh) translateX(-20px) rotate(360deg); opacity: 0; }
      }

      @keyframes jelly-wobble {
        0%, 100% { transform: scale(1, 1); }
        25% { transform: scale(0.9, 1.1); }
        50% { transform: scale(1.1, 0.9); }
        75% { transform: scale(0.95, 1.05); }
      }

      @keyframes shimmer-liquid {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .liquid-glass-refraction {
        background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.3) 100%);
        backdrop-filter: blur(40px) saturate(220%) contrast(110%);
        border: 1px solid rgba(255,255,255,0.7);
        box-shadow: 
          inset 0 4px 6px rgba(255,255,255,0.9),
          inset 0 -4px 10px rgba(0,0,0,0.1),
          0 10px 40px rgba(0,0,0,0.15);
        position: relative;
      }

      .liquid-glass-refraction::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 50%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
        border-radius: inherit;
        pointer-events: none;
      }

      .caustics-realistic {
        background: url('https://www.transparenttextures.com/patterns/cubes.png'), 
                    linear-gradient(-45deg, #00d2ff, #92fe9d, #00d2ff, #3a7bd5);
        background-size: 200% 200%;
        animation: water-swirl 20s ease-in-out infinite;
        mix-blend-mode: overlay;
      }

      .jelly-btn {
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .jelly-btn:hover {
        animation: jelly-wobble 0.6s ease;
        filter: brightness(1.2) drop-shadow(0 0 15px rgba(255,255,255,0.5));
      }

      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(to bottom, #80d8ff, #4facfe);
        border-radius: 10px;
        border: 2px solid rgba(255,255,255,0.3);
      }
    </style>
